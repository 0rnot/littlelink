      @keyframes glitch {
        0% { transform: translate(0, 0); }
        1% { transform: translate(-3px, 3px); filter: hue-rotate(90deg) saturate(3); }
        2% { transform: translate(3px, -3px); filter: hue-rotate(-90deg) saturate(3); }

      }
      @keyframes typing { from { width: 0 } to { width: 19ch } } /* chユニットは文字数 */

      document.addEventListener('DOMContentLoaded', () => {
        const btcButton = document.getElementById('btc-button');
        if (btcButton) {
          btcButton.addEventListener('click', (e) => {
            e.preventDefault(); // リンク動作（ページトップへ飛ぶ）を無効化
            const idToCopy = "12uCSMbuUhiYAhBAgFre3iG6CEXkKVxwGF"; // コピーするBTCアドレス

            // Clipboard API (モダンブラウザ用)
            if (navigator.clipboard && navigator.clipboard.writeText) {
              navigator.clipboard.writeText(idToCopy).then(() => {
                showCopiedMessage();
              }).catch(err => {
                fallbackCopy(idToCopy); // 失敗時は古い方法を試す
              });
            } else {
              fallbackCopy(idToCopy); // API未対応ブラウザ
            }
          });
        }

        // 古いブラウザ用のコピー方法（フォールバック）
        function fallbackCopy(text) {
          const textArea = document.createElement("textarea");
          textArea.value = text;
          textArea.style.position = "fixed"; // スクロール防止
          document.body.appendChild(textArea);
          textArea.focus();
          textArea.select();
          try {
            document.execCommand('copy');
            showCopiedMessage();
          } catch (err) {
            console.error('Copy failed', err);
          }
          document.body.removeChild(textArea);
        }

        // 画面中央下
        function showCopiedMessage() {
          const notification = document.createElement('div');
          notification.textContent = 'BTC address copied !';
          notification.style.cssText = `
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background-color: rgba(247, 147, 26, 0.9); color: white; font-family: 'Courier New', monospace;
            padding: 12px 24px; border-radius: 5px; z-index: 10000;
            box-shadow: 0 0 15px rgba(247, 147, 26, 0.6); opacity: 0; transition: opacity 0.3s;
          `;
          document.body.appendChild(notification);
          
          // ふわっと出す
          requestAnimationFrame(() => notification.style.opacity = '1');

          // 2秒後に消す
          setTimeout(() => {
            notification.style.opacity = '0';
            setTimeout(() => document.body.removeChild(notification), 300);
          }, 2000);
        }
