<style>
      /* --- グローバル設定 --- */
      html {
        cursor: crosshair; /* マウスポインターを十字（照準）にする */
      }
      a {
        cursor: pointer;
      }

      /* --- モニター風グリッド背景（強化版） --- */
      body {
        background-image: 
          linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px) !important;
        background-size: 30px 30px !important;
      }

      /* --- ハッカー風タイトル（発光強化） --- */
      h1 {
        font-family: 'Courier New', Consolas, monospace !important;
        letter-spacing: 3px !important;
        text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
      }

      /* --- アバター画像グリッチ（バグ）エフェクト --- */
      .avatar {
        animation: glitch 4s step-end infinite;
        position: relative;
      }
      @keyframes glitch {
        0% { transform: translate(0, 0); }
        1% { transform: translate(-3px, 3px); filter: hue-rotate(90deg) saturate(3); }
        2% { transform: translate(3px, -3px); filter: hue-rotate(-90deg) saturate(3); }
        3% { transform: translate(0, 0); filter: hue-rotate(0deg) saturate(1); }
      }

      /* --- タイピング風アニメーション（High Tech, Low Life） --- */
      .column > p {
        color: rgba(255, 255, 255, 0.8) !important;
        font-family: 'Courier New', Consolas, monospace !important;
        overflow: hidden; /* はみ出した文字を隠す */
        border-right: .15em solid rgba(255, 255, 255, .75); /* タイピングカーソル */
        white-space: nowrap; /* 改行しない */
        margin: 0 auto !important;
        margin-bottom: var(--spacing-xl) !important;
        display: block;
        width: 0; /* 最初は幅0 */
        animation: 
          typing 2s steps(19, end) forwards, /* 19文字分アニメーション */
          blink-caret .75s step-end infinite;
      }
      @keyframes typing { from { width: 0 } to { width: 19ch } } /* chユニットは文字数 */
      @keyframes blink-caret { from, to { border-color: transparent } 50% { border-color: white; } }

      /* --- ボタン基本設定（ふわっと変化） --- */
      .button, .button img {
        transition: all 0.2s ease !important;
      }

      /* --- 枠線消し（GitHub, X, Obsidian, PayPay） --- */
      .button-github, .button-x, .button-obsidian, .button-paypay {
        border: none !important;
      }
  
      /* --- PayPayボタン設定（赤） --- */
      .button-paypay {
        background-color: #FF0032 !important;
        color: #FFFFFF !important;
      }

      /* ↓ これが抜けてました！アイコンを強制的に真っ白にする魔法 ↓ */
      .button-paypay img {
        filter: brightness(0) invert(1) !important;
      }

      /* --- サイバー風ホバー（反転＆ネオン）エフェクト --- */
      .button:hover {
        transform: translateY(-3px) scale(1.02); /* 少し浮いて大きくなる */
        box-shadow: 0 0 20px rgba(255, 255, 255, 0.6) !important; /* ★ここを追加：全ボタン共通で白く発光！★ */
      }
      
      /* PayPayのホバー（赤ネオン維持） */
      .button-paypay:hover {
        background-color: #FF0032 !important;
        color: #FFFFFF !important;
      }
      .button-paypay:hover img {
        filter: brightness(0) invert(1) !important;
      }

      /* GitHub/X/Obsidianのホバー（白黒反転＆強めの白ネオン） */
      :root.theme-dark .button-github:hover,
      :root.theme-dark .button-x:hover,
      :root.theme-dark .button-obsidian:hover {
        background-color: #ffffff !important;
        color: #000000 !important;
        box-shadow: 0 0 25px #ffffff !important;
      }
      :root.theme-dark .button-github:hover img,
      :root.theme-dark .button-x:hover img,
      :root.theme-dark .button-obsidian:hover img {
        filter: invert(1) !important;
      }
    </style>

  <script>
      document.addEventListener('DOMContentLoaded', () => {
        const paypayButton = document.getElementById('paypay-button');
        if (paypayButton) {
          paypayButton.addEventListener('click', (e) => {
            e.preventDefault(); // リンク動作（ページトップへ飛ぶ）を無効化
            const idToCopy = "ornot"; // コピーするID

            // Clipboard API (モダンブラウザ用)
            if (navigator.clipboard && navigator.clipboard.writeText) {
              navigator.clipboard.writeText(idToCopy).then(() => {
                showCopiedMessage();
              }).catch(err => {
                fallbackCopy(idToCopy); // 失敗時は古い方法を試す
              });
            } else {
              fallbackCopy(idToCopy); // API未対応ブラウザ
            }
          });
        }

        // 古いブラウザ用のコピー方法（フォールバック）
        function fallbackCopy(text) {
          const textArea = document.createElement("textarea");
          textArea.value = text;
          textArea.style.position = "fixed"; // スクロール防止
          document.body.appendChild(textArea);
          textArea.focus();
          textArea.select();
          try {
            document.execCommand('copy');
            showCopiedMessage();
          } catch (err) {
            console.error('Copy failed', err);
          }
          document.body.removeChild(textArea);
        }

        // 画面中央下にハッカー風の通知を出す関数
        function showCopiedMessage() {
          const notification = document.createElement('div');
          notification.textContent = 'SYSTEM: PayPay ID "ornot" コピー完了...';
          notification.style.cssText = `
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background-color: rgba(0, 255, 0, 0.8); color: black; font-family: 'Courier New', monospace;
            padding: 12px 24px; border-radius: 5px; z-index: 10000;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.5); opacity: 0; transition: opacity 0.3s;
          `;
          document.body.appendChild(notification);
          
          // ふわっと出す
          requestAnimationFrame(() => notification.style.opacity = '1');

          // 1.8秒後に消す
          setTimeout(() => {
            notification.style.opacity = '0';
            setTimeout(() => document.body.removeChild(notification), 300);
          }, 1800);
        }
      });
    </script>
